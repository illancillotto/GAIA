name: backend-ci

on:
  push:
    paths:
      - "modules/accessi/backend/**"
      - ".github/workflows/backend.yml"
  pull_request:
    paths:
      - "modules/accessi/backend/**"
      - ".github/workflows/backend.yml"

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: modules/accessi/backend
        run: pip install -r requirements.txt

      - name: Syntax check
        working-directory: modules/accessi/backend
        run: python -m compileall app tests

      - name: Test suite
        working-directory: modules/accessi/backend
        run: pytest -q
