name: frontend-ci

on:
  push:
    paths:
      - "modules/accessi/frontend/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    paths:
      - "modules/accessi/frontend/**"
      - ".github/workflows/frontend.yml"

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        working-directory: modules/accessi/frontend
        run: npm install

      - name: Placeholder lint
        working-directory: modules/accessi/frontend
        run: npm run lint

      - name: Smoke tests
        working-directory: .
        run: npm --prefix modules/accessi/frontend run test

      - name: Build application
        working-directory: modules/accessi/frontend
        run: npm run build
