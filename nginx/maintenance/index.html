<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>GAIA in aggiornamento</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f5f1e8;
        --panel: #fffdf8;
        --text: #132218;
        --muted: #5f6d62;
        --accent: #1d4e35;
        --accent-soft: #dbe9df;
        --border: #d6ddd2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background:
          radial-gradient(circle at top right, rgba(29, 78, 53, 0.08), transparent 28%),
          linear-gradient(180deg, #faf7f0 0%, var(--bg) 100%);
        color: var(--text);
      }

      main {
        width: min(680px, 100%);
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 28px;
        padding: 40px 32px;
        box-shadow: 0 24px 80px rgba(16, 36, 24, 0.12);
      }

      .eyebrow {
        margin: 0;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 16px 0 12px;
        font-size: clamp(32px, 5vw, 48px);
        line-height: 1.02;
      }

      p {
        margin: 0;
        font-size: 16px;
        line-height: 1.6;
        color: var(--muted);
      }

      .status {
        margin-top: 28px;
        display: inline-flex;
        align-items: center;
        gap: 10px;
        padding: 10px 16px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-weight: 700;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--accent);
        box-shadow: 0 0 0 8px rgba(29, 78, 53, 0.12);
        animation: pulse 1.8s infinite;
      }

      .note {
        margin-top: 20px;
        font-size: 14px;
      }

      @keyframes pulse {
        0%,
        100% {
          transform: scale(1);
          opacity: 1;
        }
        50% {
          transform: scale(1.12);
          opacity: 0.7;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <p class="eyebrow">GAIA</p>
      <h1>Deploy in corso</h1>
      <p>Il sistema si sta aggiornando. Torna tra pochi minuti: stiamo completando il rilascio e riallineando i servizi.</p>
      <div class="status">
        <span class="dot" aria-hidden="true"></span>
        Aggiornamento piattaforma attivo
      </div>
      <p class="note">Se la pagina resta visibile troppo a lungo, contatta il CED.</p>
    </main>
  </body>
</html>
