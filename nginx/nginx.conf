map $http_upgrade $connection_upgrade {
  default upgrade;
  ''      close;
}

server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;
  error_page 503 /maintenance/index.html;

  client_max_body_size 128m;

  set $maintenance_mode 0;
  if (-f /var/lib/gaia-nginx-maintenance/on) {
    set $maintenance_mode 1;
  }

  location = /maintenance/index.html {
    root /usr/share/nginx/html;
    internal;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;
    add_header Retry-After "120" always;
  }

  # District tiles: no browser caching so geometry updates appear immediately after import.
  location /tiles/cat_distretti/ {
    if ($maintenance_mode = 1) {
      return 503;
    }
    set $martin_upstream martin:3000;
    rewrite ^/tiles/(.*)$ /$1 break;
    proxy_pass http://$martin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    add_header Cache-Control "no-store, must-revalidate";
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  }

  location /tiles/ {
    if ($maintenance_mode = 1) {
      return 503;
    }
    set $martin_upstream martin:3000;
    # When proxy_pass URL contains a variable, nginx does NOT strip the
    # location prefix automatically, even with a trailing slash. Without an
    # explicit rewrite, Martin would see "/tiles/cat_distretti/{z}/{x}/{y}"
    # and respond with its index page (200 + plain text) instead of the MVT.
    rewrite ^/tiles/(.*)$ /$1 break;
    proxy_pass http://$martin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    add_header Cache-Control "public, max-age=600";
    add_header Access-Control-Allow-Origin $http_origin always;
    add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
  }

  location /api/ {
    if ($maintenance_mode = 1) {
      return 503;
    }
    set $backend_upstream backend:8000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    # Rewrite absolute redirect URLs from the backend (e.g. FastAPI trailing-slash
    # redirects) back to the /api/ prefix so the browser re-enters the correct
    # proxy path.  We use $http_host (original client Host header, including port)
    # so the rewritten Location is valid from the browser's perspective.
    proxy_redirect ~^https?://[^/]+/(.*)$ $scheme://$http_host/api/$1;
  }

  location / {
    if ($maintenance_mode = 1) {
      return 503;
    }
    set $frontend_upstream frontend:3000;
    proxy_pass http://$frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
  }
}
