server {
  listen 80;
  server_name _;
  resolver 127.0.0.11 valid=10s ipv6=off;

  client_max_body_size 128m;

  location /api/ {
    set $backend_upstream backend:8000;
    rewrite ^/api/(.*)$ /$1 break;
    proxy_pass http://$backend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_send_timeout 900s;
    proxy_read_timeout 900s;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    # Rewrite absolute redirect URLs from the backend (e.g. FastAPI trailing-slash
    # redirects) back to the /api/ prefix so the browser re-enters the correct
    # proxy path.  We use $http_host (original client Host header, including port)
    # so the rewritten Location is valid from the browser's perspective.
    proxy_redirect ~^https?://[^/]+/(.*)$ $scheme://$http_host/api/$1;
  }

  location / {
    set $frontend_upstream frontend:3000;
    proxy_pass http://$frontend_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
  }
}
