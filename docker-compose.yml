services:
  postgres:
    image: postgres:16-alpine
    container_name: naap-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: naap-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NETWORK_ARP_HELPER_BASE_URL: ${NETWORK_ARP_HELPER_BASE_URL:-http://host.docker.internal:9105}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - catasto-data:/data/catasto
      - anagrafica-data:/data/anagrafica
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: naap-frontend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.29-alpine
    container_name: naap-nginx
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3

  elaborazioni-worker:
    build:
      context: .
      dockerfile: ./modules/elaborazioni/worker/Dockerfile
    container_name: gaia-elaborazioni-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      CAPTCHA_MAX_OCR_ATTEMPTS: ${CAPTCHA_MAX_OCR_ATTEMPTS:-3}
      BETWEEN_VISURE_DELAY_SEC: ${BETWEEN_VISURE_DELAY_SEC:-5}
      ELABORAZIONI_DOCUMENT_STORAGE_PATH: ${ELABORAZIONI_DOCUMENT_STORAGE_PATH:-${CATASTO_DOCUMENT_STORAGE_PATH:-/data/catasto/documents}}
      ELABORAZIONI_CAPTCHA_STORAGE_PATH: ${ELABORAZIONI_CAPTCHA_STORAGE_PATH:-${CATASTO_CAPTCHA_STORAGE_PATH:-/data/catasto/captcha}}
      ELABORAZIONI_DEBUG_ARTIFACTS_PATH: ${ELABORAZIONI_DEBUG_ARTIFACTS_PATH:-${CATASTO_DEBUG_ARTIFACTS_PATH:-/data/catasto/debug}}
      ELABORAZIONI_SISTER_SELECTORS_PATH: ${ELABORAZIONI_SISTER_SELECTORS_PATH:-${CATASTO_SISTER_SELECTORS_PATH:-/app/worker/sister_selectors.json}}
      ELABORAZIONI_LOG_LEVEL: ${ELABORAZIONI_LOG_LEVEL:-${CATASTO_LOG_LEVEL:-INFO}}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - catasto-data:/data/catasto

  scanner:
    build:
      context: ./backend
    container_name: gaia-network-scanner
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NETWORK_RANGE: ${NETWORK_RANGE:-192.168.1.0/24}
      NETWORK_SCAN_ENABLED: ${NETWORK_SCAN_ENABLED:-true}
      NETWORK_SCAN_INTERVAL_SECONDS: ${NETWORK_SCAN_INTERVAL_SECONDS:-900}
      NETWORK_SCAN_PORTS: ${NETWORK_SCAN_PORTS:-22,80,161,443,445,3389}
      NETWORK_ENRICHMENT_TIMEOUT_SECONDS: ${NETWORK_ENRICHMENT_TIMEOUT_SECONDS:-1.0}
      NETWORK_SNMP_COMMUNITIES: ${NETWORK_SNMP_COMMUNITIES:-public}
      NETWORK_SNMP_COMMUNITY_PROFILES: ${NETWORK_SNMP_COMMUNITY_PROFILES:-[]}
      NETWORK_ARP_HELPER_BASE_URL: ${NETWORK_ARP_HELPER_BASE_URL:-http://host.docker.internal:9105}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.scripts.network_scanner
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_RAW
      - NET_ADMIN

  arp-helper:
    build:
      context: ./backend
    container_name: gaia-arp-helper
    restart: unless-stopped
    network_mode: host
    entrypoint: ["python", "-m", "app.scripts.arp_helper"]

volumes:
  postgres_data:
  catasto-data:
  anagrafica-data:
