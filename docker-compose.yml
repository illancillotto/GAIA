services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: gaia-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_buffers=8GB
      - -c
      - effective_cache_size=24GB
      - -c
      - work_mem=128MB
      - -c
      - maintenance_work_mem=2GB
      - -c
      - temp_buffers=256MB
      - -c
      - effective_io_concurrency=200
      - -c
      - random_page_cost=1.1
      - -c
      - seq_page_cost=1.0
      - -c
      - max_worker_processes=16
      - -c
      - max_parallel_workers=16
      - -c
      - max_parallel_workers_per_gather=8
      - -c
      - max_parallel_maintenance_workers=6
      - -c
      - jit=off
      - -c
      - max_connections=200
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  martin:
    image: ghcr.io/maplibre/martin:latest
    container_name: gaia-martin
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    volumes:
      - ./config/martin.toml:/config.toml:ro
    command: ["--config", "/config.toml"]
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build:
      context: ./backend
    image: ${COMPOSE_PROJECT_NAME:-gaia}-backend:latest
    container_name: gaia-backend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      NETWORK_ARP_HELPER_BASE_URL: ${NETWORK_ARP_HELPER_BASE_URL:-http://host.docker.internal:9105}
      WIKI_AGENT_FALLBACK_ENABLED: ${WIKI_AGENT_FALLBACK_ENABLED:-false}
      WIKI_AGENT_CLI_PATH: ${WIKI_AGENT_CLI_PATH:-${WIKI_AGENT_HOST_HOME:-/home/cbo}/.local/bin/agent}
      WIKI_AGENT_HOME: ${WIKI_AGENT_HOME:-${WIKI_AGENT_HOST_HOME:-/home/cbo}}
      WIKI_AGENT_WORKSPACE: ${WIKI_AGENT_WORKSPACE:-/app}
      WIKI_AGENT_TIMEOUT_SECONDS: ${WIKI_AGENT_TIMEOUT_SECONDS:-45}
      WIKI_AGENT_MODEL: ${WIKI_AGENT_MODEL:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - catasto-data:/data/catasto
      - anagrafica-data:/data/anagrafica
      - ./runtime-data:/runtime-data
      - ${PRESENZE_SCRAPER_HOST_PATH:-/home/cbo/CursorProjects/inaz-scraper}:/opt/presenze-scraper:ro
      - ${WIKI_AGENT_HOST_HOME:-/home/cbo}/.local/bin:${WIKI_AGENT_HOST_HOME:-/home/cbo}/.local/bin:ro
      - ${WIKI_AGENT_HOST_HOME:-/home/cbo}/.local/share/cursor-agent:${WIKI_AGENT_HOST_HOME:-/home/cbo}/.local/share/cursor-agent:ro
      - ${WIKI_AGENT_HOST_HOME:-/home/cbo}/.config/cursor:${WIKI_AGENT_HOST_HOME:-/home/cbo}/.config/cursor:ro
      - ${WIKI_AGENT_HOST_HOME:-/home/cbo}/.cursor:${WIKI_AGENT_HOST_HOME:-/home/cbo}/.cursor:rw
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  presenze-worker:
    image: ${COMPOSE_PROJECT_NAME:-gaia}-backend:latest
    container_name: gaia-presenze-worker
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      NETWORK_ARP_HELPER_BASE_URL: ${NETWORK_ARP_HELPER_BASE_URL:-http://host.docker.internal:9105}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.modules.presenze.services.queue_worker
    volumes:
      - catasto-data:/data/catasto
      - anagrafica-data:/data/anagrafica
      - ./runtime-data:/runtime-data
      - ${PRESENZE_SCRAPER_HOST_PATH:-/home/cbo/CursorProjects/inaz-scraper}:/opt/presenze-scraper:ro
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      network: host
    container_name: gaia-frontend
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    depends_on:
      backend:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.29-alpine
    container_name: gaia-nginx
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      martin:
        condition: service_started
      frontend:
        condition: service_started
      backend:
        condition: service_started
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/maintenance:/usr/share/nginx/html/maintenance:ro
      - ./runtime-data/nginx-maintenance:/var/lib/gaia-nginx-maintenance
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3

  elaborazioni-worker-visure:
    build:
      context: .
      dockerfile: ./modules/elaborazioni/worker/Dockerfile
    container_name: gaia-elaborazioni-worker-visure
    restart: unless-stopped
    stop_grace_period: "30s"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      BETWEEN_VISURE_DELAY_SEC: ${BETWEEN_VISURE_DELAY_SEC:-5}
      CAPTCHA_LLM_AGENT_CMD: ${CAPTCHA_LLM_AGENT_CMD:-/home/cbo/.local/share/cursor-agent/versions/2026.05.09-0afadcc/cursor-agent}
      HOME: /home/cbo
      CAPTCHA_LLM_ENABLED: ${CAPTCHA_LLM_ENABLED:-true}
      CAPTCHA_LLM_ATTEMPTS: ${CAPTCHA_LLM_ATTEMPTS:-3}
      CAPTCHA_EXTERNAL_ATTEMPTS: ${CAPTCHA_EXTERNAL_ATTEMPTS:-3}
      ELABORAZIONI_DOCUMENT_STORAGE_PATH: ${ELABORAZIONI_DOCUMENT_STORAGE_PATH:-${CATASTO_DOCUMENT_STORAGE_PATH:-/data/catasto/documents}}
      ELABORAZIONI_CAPTCHA_STORAGE_PATH: ${ELABORAZIONI_CAPTCHA_STORAGE_PATH:-${CATASTO_CAPTCHA_STORAGE_PATH:-/data/catasto/captcha}}
      ELABORAZIONI_DEBUG_ARTIFACTS_PATH: ${ELABORAZIONI_DEBUG_ARTIFACTS_PATH:-${CATASTO_DEBUG_ARTIFACTS_PATH:-/data/catasto/debug}}
      ELABORAZIONI_SISTER_SELECTORS_PATH: ${ELABORAZIONI_SISTER_SELECTORS_PATH:-${CATASTO_SISTER_SELECTORS_PATH:-/app/worker/sister_selectors.json}}
      ELABORAZIONI_LOG_LEVEL: ${ELABORAZIONI_LOG_LEVEL:-${CATASTO_LOG_LEVEL:-INFO}}
      ELABORAZIONI_WORKER_FAMILIES: ${ELABORAZIONI_WORKER_FAMILIES_VISURE:-visure}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - catasto-data:/data/catasto
      - /home/cbo/.local/share/cursor-agent:/home/cbo/.local/share/cursor-agent:ro
      - /home/cbo/.cursor:/home/cbo/.cursor:rw
      - /home/cbo/.config/cursor:/home/cbo/.config/cursor:ro

  elaborazioni-worker-runtime:
    build:
      context: .
      dockerfile: ./modules/elaborazioni/worker/Dockerfile
    container_name: gaia-elaborazioni-worker-runtime
    restart: unless-stopped
    stop_grace_period: "30s"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      BETWEEN_VISURE_DELAY_SEC: ${BETWEEN_VISURE_DELAY_SEC:-5}
      CAPTCHA_LLM_AGENT_CMD: ${CAPTCHA_LLM_AGENT_CMD:-/home/cbo/.local/share/cursor-agent/versions/2026.05.09-0afadcc/cursor-agent}
      HOME: /home/cbo
      CAPTCHA_LLM_ENABLED: ${CAPTCHA_LLM_ENABLED:-true}
      CAPTCHA_LLM_ATTEMPTS: ${CAPTCHA_LLM_ATTEMPTS:-3}
      CAPTCHA_EXTERNAL_ATTEMPTS: ${CAPTCHA_EXTERNAL_ATTEMPTS:-3}
      ELABORAZIONI_DOCUMENT_STORAGE_PATH: ${ELABORAZIONI_DOCUMENT_STORAGE_PATH:-${CATASTO_DOCUMENT_STORAGE_PATH:-/data/catasto/documents}}
      ELABORAZIONI_CAPTCHA_STORAGE_PATH: ${ELABORAZIONI_CAPTCHA_STORAGE_PATH:-${CATASTO_CAPTCHA_STORAGE_PATH:-/data/catasto/captcha}}
      ELABORAZIONI_DEBUG_ARTIFACTS_PATH: ${ELABORAZIONI_DEBUG_ARTIFACTS_PATH:-${CATASTO_DEBUG_ARTIFACTS_PATH:-/data/catasto/debug}}
      ELABORAZIONI_SISTER_SELECTORS_PATH: ${ELABORAZIONI_SISTER_SELECTORS_PATH:-${CATASTO_SISTER_SELECTORS_PATH:-/app/worker/sister_selectors.json}}
      ELABORAZIONI_LOG_LEVEL: ${ELABORAZIONI_LOG_LEVEL:-${CATASTO_LOG_LEVEL:-INFO}}
      ELABORAZIONI_WORKER_FAMILIES: ${ELABORAZIONI_WORKER_FAMILIES_RUNTIME:-runtime}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - catasto-data:/data/catasto
      - /home/cbo/.local/share/cursor-agent:/home/cbo/.local/share/cursor-agent:ro
      - /home/cbo/.cursor:/home/cbo/.cursor:rw
      - /home/cbo/.config/cursor:/home/cbo/.config/cursor:ro

  elaborazioni-worker-autodoc:
    build:
      context: .
      dockerfile: ./modules/elaborazioni/worker/Dockerfile
    container_name: gaia-elaborazioni-worker-autodoc
    restart: unless-stopped
    stop_grace_period: "30s"
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      BETWEEN_VISURE_DELAY_SEC: ${BETWEEN_VISURE_DELAY_SEC:-5}
      CAPTCHA_LLM_AGENT_CMD: ${CAPTCHA_LLM_AGENT_CMD:-/home/cbo/.local/share/cursor-agent/versions/2026.05.09-0afadcc/cursor-agent}
      HOME: /home/cbo
      CAPTCHA_LLM_ENABLED: ${CAPTCHA_LLM_ENABLED:-true}
      CAPTCHA_LLM_ATTEMPTS: ${CAPTCHA_LLM_ATTEMPTS:-3}
      CAPTCHA_EXTERNAL_ATTEMPTS: ${CAPTCHA_EXTERNAL_ATTEMPTS:-3}
      ELABORAZIONI_DOCUMENT_STORAGE_PATH: ${ELABORAZIONI_DOCUMENT_STORAGE_PATH:-${CATASTO_DOCUMENT_STORAGE_PATH:-/data/catasto/documents}}
      ELABORAZIONI_CAPTCHA_STORAGE_PATH: ${ELABORAZIONI_CAPTCHA_STORAGE_PATH:-${CATASTO_CAPTCHA_STORAGE_PATH:-/data/catasto/captcha}}
      ELABORAZIONI_DEBUG_ARTIFACTS_PATH: ${ELABORAZIONI_DEBUG_ARTIFACTS_PATH:-${CATASTO_DEBUG_ARTIFACTS_PATH:-/data/catasto/debug}}
      ELABORAZIONI_SISTER_SELECTORS_PATH: ${ELABORAZIONI_SISTER_SELECTORS_PATH:-${CATASTO_SISTER_SELECTORS_PATH:-/app/worker/sister_selectors.json}}
      ELABORAZIONI_LOG_LEVEL: ${ELABORAZIONI_LOG_LEVEL:-${CATASTO_LOG_LEVEL:-INFO}}
      ELABORAZIONI_WORKER_FAMILIES: ${ELABORAZIONI_WORKER_FAMILIES_AUTODOC:-autodoc}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - catasto-data:/data/catasto
      - /home/cbo/.local/share/cursor-agent:/home/cbo/.local/share/cursor-agent:ro
      - /home/cbo/.cursor:/home/cbo/.cursor:rw
      - /home/cbo/.config/cursor:/home/cbo/.config/cursor:ro

  scanner:
    build:
      context: ./backend
    image: ${COMPOSE_PROJECT_NAME:-gaia}-backend:latest
    container_name: gaia-network-scanner
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NETWORK_RANGE: ${NETWORK_RANGE:-192.168.1.0/24}
      NETWORK_SCAN_ENABLED: ${NETWORK_SCAN_ENABLED:-true}
      NETWORK_SCAN_INTERVAL_SECONDS: ${NETWORK_SCAN_INTERVAL_SECONDS:-900}
      NETWORK_SCAN_PORTS: ${NETWORK_SCAN_PORTS:-22,80,161,443,445,3389}
      NETWORK_ENRICHMENT_TIMEOUT_SECONDS: ${NETWORK_ENRICHMENT_TIMEOUT_SECONDS:-1.0}
      NETWORK_SNMP_COMMUNITIES: ${NETWORK_SNMP_COMMUNITIES:-public}
      NETWORK_SNMP_COMMUNITY_PROFILES: ${NETWORK_SNMP_COMMUNITY_PROFILES:-[]}
      NETWORK_ARP_HELPER_BASE_URL: ${NETWORK_ARP_HELPER_BASE_URL:-http://host.docker.internal:9105}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: python -m app.scripts.network_scanner
    depends_on:
      postgres:
        condition: service_healthy
    cap_add:
      - NET_RAW
      - NET_ADMIN

  sophos-syslog:
    build:
      context: ./backend
    image: ${COMPOSE_PROJECT_NAME:-gaia}-backend:latest
    container_name: gaia-sophos-syslog
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NETWORK_SOPHOS_SYSLOG_ENABLED: ${NETWORK_SOPHOS_SYSLOG_ENABLED:-true}
      NETWORK_SOPHOS_SYSLOG_BIND_HOST: ${NETWORK_SOPHOS_SYSLOG_BIND_HOST:-0.0.0.0}
      NETWORK_SOPHOS_SYSLOG_PORT: ${NETWORK_SOPHOS_SYSLOG_PORT:-5514}
      NETWORK_SOPHOS_FIREWALL_DEFAULT_NAME: ${NETWORK_SOPHOS_FIREWALL_DEFAULT_NAME:-Sophos XGS87}
      NETWORK_SOPHOS_FIREWALL_MANAGEMENT_IP: ${NETWORK_SOPHOS_FIREWALL_MANAGEMENT_IP:-}
    command: python -m app.scripts.network_sophos_syslog
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${NETWORK_SOPHOS_SYSLOG_PORT:-5514}:${NETWORK_SOPHOS_SYSLOG_PORT:-5514}/udp"

  sophos-snmp:
    build:
      context: ./backend
    image: ${COMPOSE_PROJECT_NAME:-gaia}-backend:latest
    container_name: gaia-sophos-snmp
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      NETWORK_SOPHOS_SNMP_ENABLED: ${NETWORK_SOPHOS_SNMP_ENABLED:-true}
      NETWORK_SOPHOS_SNMP_HOST: ${NETWORK_SOPHOS_SNMP_HOST:-${NETWORK_SOPHOS_FIREWALL_MANAGEMENT_IP:-}}
      NETWORK_SOPHOS_SNMP_PORT: ${NETWORK_SOPHOS_SNMP_PORT:-161}
      NETWORK_SOPHOS_SNMP_COMMUNITY: ${NETWORK_SOPHOS_SNMP_COMMUNITY:-public}
      NETWORK_SOPHOS_SNMP_INTERVAL_SECONDS: ${NETWORK_SOPHOS_SNMP_INTERVAL_SECONDS:-300}
      NETWORK_SOPHOS_SNMP_CUSTOM_OIDS: ${NETWORK_SOPHOS_SNMP_CUSTOM_OIDS:-[]}
      NETWORK_SOPHOS_FIREWALL_DEFAULT_NAME: ${NETWORK_SOPHOS_FIREWALL_DEFAULT_NAME:-Sophos XGS87}
      NETWORK_SOPHOS_FIREWALL_MANAGEMENT_IP: ${NETWORK_SOPHOS_FIREWALL_MANAGEMENT_IP:-}
    command: python -m app.scripts.network_sophos_snmp
    depends_on:
      postgres:
        condition: service_healthy

  arp-helper:
    build:
      context: ./backend
    image: ${COMPOSE_PROJECT_NAME:-gaia}-backend:latest
    container_name: gaia-arp-helper
    restart: unless-stopped
    dns:
      - 1.1.1.1
      - 8.8.8.8
    network_mode: host
    entrypoint: ["python", "-m", "app.scripts.arp_helper"]

volumes:
  postgres_data:
    name: ${POSTGRES_VOLUME_NAME:-gaia_postgres_data}
  catasto-data:
  anagrafica-data:
