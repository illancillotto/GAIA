services:
  local-dev-gateway:
    image: nginx:1.29-alpine
    container_name: gaia-local-dev-gateway
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "${LOCAL_DEV_GATEWAY_PORT:-80}:80"
    volumes:
      - ./nginx/local-dev-gateway.conf:/etc/nginx/conf.d/default.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 3
