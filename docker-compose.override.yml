services:
  postgres:
    ports:
      - "5434:5432"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      CODEX_LB_URL: http://host.docker.internal:2455/v1
      WIKI_DOCS_ROOT: /app/docs
      WIKI_AGENT_FALLBACK_ENABLED: ${WIKI_AGENT_FALLBACK_ENABLED:-false}
      WIKI_AGENT_CLI_PATH: ${HOME}/.local/bin/agent
      WIKI_AGENT_HOME: ${HOME}
      WIKI_AGENT_WORKSPACE: ${WIKI_AGENT_WORKSPACE:-/tmp}
      WIKI_AGENT_TIMEOUT_SECONDS: ${WIKI_AGENT_TIMEOUT_SECONDS:-45}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./secrets/pdnd:/app/secrets/pdnd:ro
      - catasto-data:/data/catasto
      - .:/app/docs:ro
      - ${HOME}:${HOME}
      - /home/cbo/CursorProjects/presenze-scraper:/opt/presenze-scraper:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    command: sh /app/scripts/dev-entrypoint.sh
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  elaborazioni-worker-visure:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/elaborazioni/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  elaborazioni-worker-runtime:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/elaborazioni/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  elaborazioni-worker-autodoc:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/elaborazioni/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  scanner:
    command: python -m app.scripts.network_scanner
    volumes:
      - ./backend:/app

  sophos-syslog:
    command: python -m app.scripts.network_sophos_syslog
    volumes:
      - ./backend:/app

  sophos-snmp:
    command: python -m app.scripts.network_sophos_snmp
    volumes:
      - ./backend:/app

  arp-helper:
    volumes:
      - ./backend:/app

volumes:
  catasto-data:
