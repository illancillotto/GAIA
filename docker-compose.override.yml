services:
  postgres:
    ports:
      - "5434:5432"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4
    environment:
      CODEX_LB_URL: http://host.docker.internal:2456/v1
      WIKI_DOCS_ROOT: /app/docs
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./backend:/app
      - ./secrets/pdnd:/app/secrets/pdnd:ro
      - catasto-data:/data/catasto
      - .:/app/docs:ro
      - /home/cbo/CursorProjects/inaz-scraper:/home/cbo/CursorProjects/inaz-scraper:ro
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    command: sh /app/scripts/dev-entrypoint.sh
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  elaborazioni-worker-visure:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/elaborazioni/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  elaborazioni-worker-runtime:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/elaborazioni/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  elaborazioni-worker-autodoc:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/elaborazioni/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  scanner:
    command: python -m app.scripts.network_scanner
    volumes:
      - ./backend:/app

  arp-helper:
    volumes:
      - ./backend:/app

volumes:
  catasto-data:
