services:
  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - catasto-data:/data/catasto
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  frontend:
    command: npm run dev
    environment:
      NODE_ENV: development
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    ports:
      - "${FRONTEND_PORT:-3000}:3000"

  catasto-worker:
    command: python /app/worker/worker.py
    volumes:
      - ./modules/catasto/worker:/app/worker
      - ./backend:/app/backend
      - catasto-data:/data/catasto

  scanner:
    command: python -m app.scripts.network_scanner
    volumes:
      - ./backend:/app

  arp-helper:
    volumes:
      - ./backend:/app

volumes:
  catasto-data:
